name: release

# Cut a versioned release by pushing a version tag (e.g. `v0.1.0`).
# Every push to main also creates the next patch release (e.g. `v0.1.1`)
# with generated release notes, so installers and `/update latest` pick up
# a numbered release with a changelog.
# Can also be run from the Actions tab (workflow_dispatch) for a dry-run rebuild.
#
# Pipeline: verify (full CI) -> cross-platform standalone binaries (Bun + nexe) ->
# GitHub Release with SHA256SUMS + auto-generated notes -> npm publish
# (tag pushes only, when an NPM_TOKEN secret is configured).
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release against (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # create the Release + upload assets
  id-token: write # npm publish --provenance

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      should_publish_release: ${{ steps.version.outputs.should_publish_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            git fetch --tags --force
            latest="$(
              git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              head -n 1 ||
              true
            )"
            if [[ -z "${latest}" ]]; then
              latest="v0.1.0"
            fi
            IFS=. read -r major minor patch <<< "${latest#v}"
            release_tag="v${major}.${minor}.$((patch + 1))"
            should_publish_release="true"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            should_publish_release="true"
          else
            release_tag="${{ github.event.inputs.tag }}"
            should_publish_release="false"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=PentesterFlow ${release_tag}"
            echo "should_publish_release=${should_publish_release}"
          } >> "$GITHUB_OUTPUT"

  # Gate: never ship anything unless the full suite is green.
  verify:
    name: verify
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run ci # typecheck -> lint -> test -> build

  # Modern 64-bit targets compiled with Bun (fast, native binaries).
  binaries-bun:
    name: build ${{ matrix.name }}
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-darwin-arm64, name: pentesterflow-darwin-arm64 }
          - { target: bun-darwin-x64, name: pentesterflow-darwin-x64 }
          - { target: bun-linux-x64, name: pentesterflow-linux-x64 }
          - { target: bun-linux-arm64, name: pentesterflow-linux-arm64 }
          - { target: bun-windows-x64, name: pentesterflow-windows-x64.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Stamp version into the binary
        run: |
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          if [[ "${RELEASE_TAG}" == v* ]]; then
            VER="${RELEASE_TAG#v}"
          else
            VER="main-${GITHUB_SHA::7}"
          fi
          sed -i "s/const FALLBACK = 'dev';/const FALLBACK = '${VER}';/" src/version/version.ts
      - name: Compile standalone binary
        run: |
          mkdir -p dist-bin
          bun build src/cli/index.ts \
            --compile \
            --minify \
            --target ${{ matrix.target }} \
            --outfile dist-bin/${{ matrix.name }}
      - name: Checksum
        run: cd dist-bin && sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist-bin/*
          if-no-files-found: error

  # Legacy 32-bit (x86) and ARMv7 targets compiled with nexe.
  # nexe bundles the Node.js runtime with the app so it works on older hardware
  # that Bun does not support.
  binaries-legacy:
    name: build ${{ matrix.name }}
    needs: [prepare, verify]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { node_arch: x86, os: ubuntu-latest, name: pentesterflow-linux-x86 }
          - { node_arch: x86, os: windows-latest, name: pentesterflow-windows-x86.exe }
          - { node_arch: armv7l, os: ubuntu-latest, name: pentesterflow-linux-armv7 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.node_arch }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Stamp version into the binary
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          if [[ "${RELEASE_TAG}" == v* ]]; then
            VER="${RELEASE_TAG#v}"
          else
            VER="main-${GITHUB_SHA::7}"
          fi
          sed -i "s/const FALLBACK = 'dev';/const FALLBACK = '${VER}';/" src/version/version.ts || \
            sed -i.bak "s/const FALLBACK = 'dev';/const FALLBACK = '${VER}';/" src/version/version.ts
      - name: Compile standalone binary (nexe)
        run: |
          mkdir -p dist-bin
          npx nexe dist/cli.js \
            --target "${{ matrix.node_arch }}" \
            --output "dist-bin/${{ matrix.name }}" \
            --verbose
      - name: Checksum (Linux)
        if: runner.os == 'Linux'
        run: cd dist-bin && sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
      - name: Checksum (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist-bin
          $hash = Get-FileHash -Path "${{ matrix.name }}" -Algorithm SHA256
          "$($hash.Hash)  ${{ matrix.name }}" | Out-File -FilePath "${{ matrix.name }}.sha256"
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist-bin/*
          if-no-files-found: error

  # Collect every binary + a combined SHA256SUMS into one GitHub Release.
  release:
    name: github release
    needs: [prepare, binaries-bun, binaries-legacy]
    if: needs.prepare.outputs.should_publish_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create numbered release tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare.outputs.release_tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ needs.prepare.outputs.release_tag }}"
      - uses: actions/download-artifact@v4
        with:
          path: dist-bin
          merge-multiple: true
      - name: Aggregate checksums
        run: |
          cd dist-bin
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          echo "Release assets:" && ls -la
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
          files: |
            dist-bin/*

  dry-run:
    name: dry-run artifacts
    needs: [prepare, binaries-bun, binaries-legacy]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-bin
          merge-multiple: true
      - name: Aggregate checksums
        run: |
          cd dist-bin
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          echo "Dry-run assets:" && ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-${{ needs.prepare.outputs.release_tag }}
          path: dist-bin/*
          if-no-files-found: error

  # npm publish runs only for real tag pushes (not manual dry-runs) and only
  # when an NPM_TOKEN secret exists, so the GitHub Release never fails just
  # because publishing isn't configured yet.
  npm:
    name: publish npm
    needs: [prepare, verify]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Stamp version from tag
        run: |
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          npm pkg set version="${RELEASE_TAG#v}"
      - run: npm run build
      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish skipped
        if: env.NPM_TOKEN == ''
        run: echo "NPM_TOKEN secret not set — skipping npm publish. The GitHub Release was still created."
